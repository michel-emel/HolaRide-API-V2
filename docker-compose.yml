services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

# This only runs the BACKEND in a container — it expects your Postgres
# database (whether that's `supabase start`'s local one, or a real
# server's Postgres later) to already be reachable at whatever
# DATABASE_URL says inside your .env file.
#
# Usage:
#   docker compose up --build
#
# NOTE: if your DATABASE_URL points to "127.0.0.1", that means
# "the container itself", NOT your host machine, once this is running
# inside Docker. If your database is running directly on your host
# (e.g. your local `supabase start`), change DATABASE_URL's host from
# 127.0.0.1 to host.docker.internal when running the backend this way.
